<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔵書登録 - Library Registry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f1ea;
            background-image: url('https://www.transparenttextures.com/patterns/paper.png');
            font-family: 'Sawarabi Mincho', serif;
            color: #3e2723;
            padding: 40px 0;
        }

        .registry-container {
            max-width: 700px;
            background: #fff;
            padding: 50px;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #d7ccc8;
            position: relative;
        }

        /* 装飾的な角のデザイン */
        .registry-container::before {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px double #d7ccc8;
            pointer-events: none;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-style: italic;
            color: #5d4037;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .form-label {
            color: #5d4037;
            font-weight: bold;
            border-left: 4px solid #8d6e63;
            padding-left: 10px;
            margin-bottom: 10px;
        }

        .form-control {
            border: 1px solid #e0e0e0;
            border-radius: 0;
            background-color: #fafafa;
            transition: 0.3s;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: #5d4037;
            box-shadow: none;
        }

        .btn-register {
            background-color: #5d4037;
            color: #fff;
            border-radius: 0;
            padding: 12px 40px;
            border: none;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-register:hover {
            background-color: #3e2723;
            color: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-cancel {
            color: #8d6e63;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            color: #3e2723;
            text-decoration: underline;
        }

        .file-upload-wrapper {
            background: #efebe9;
            padding: 20px;
            border: 1px dashed #a1887f;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="registry-container">
        <h2>New Book Registry</h2>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label">タイトル (Title)</label>
                <input type="text" name="title" class="form-control" required placeholder="書名を入力してください">
            </div>

            <div class="mb-4">
                <label class="form-label">よみがな (Reading)</label>
                <input type="text" name="title_kana" class="form-control" placeholder="ひらがなで入力">
            </div>

            <div class="mb-4">
                <label class="form-label">概要 (Summary)</label>
                <input type="text" name="summary" class="form-control" placeholder="短い紹介文">
            </div>

            <div class="mb-4">
                <label class="form-label">イラスト (Illustration)</label>
                <div class="file-upload-wrapper">
                    <input type="file" name="image" class="form-control" accept="image/*">
                    <small class="text-muted d-block mt-2">表紙や挿絵となる画像を選択してください</small>
                </div>
            </div>

            <div class="mb-5">
                <label class="form-label">本文 (Content)</label>
                <textarea name="content" rows="10" class="form-control" placeholder="物語を綴ってください..."></textarea>
            </div>

            <div class="d-flex justify-content-between align-items-center">
                <a href="{% url 'timeline' %}" class="btn-cancel">目録に戻る</a>
                <button type="submit" class="btn btn-register">
                    蔵書を登録する
                </button>
            </div>
        </form>
    </div>
</div>

<footer class="text-center mt-5 mb-5 text-muted">
    <small>Library Registry System v2.0</small>
</footer>

</body>
</html>
