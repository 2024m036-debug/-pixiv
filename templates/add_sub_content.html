<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詳細情報の追加 - {{ post.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f1ea;
            background-image: url('https://www.transparenttextures.com/patterns/paper.png');
            font-family: 'Sawarabi Mincho', serif;
            color: #3e2723;
            padding: 40px 0;
        }

        .annotation-container {
            max-width: 700px;
            background: #fff;
            padding: 50px;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #d7ccc8;
            position: relative;
        }

        /* 装飾的な内枠 */
        .annotation-container::before {
            content: "";
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px double #d7ccc8;
            pointer-events: none;
        }

        h1 {
            font-size: 1.5rem;
            color: #5d4037;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        h1 span {
            display: block;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1rem;
            color: #8d6e63;
            margin-bottom: 10px;
        }

        .form-label {
            color: #5d4037;
            font-weight: bold;
            border-left: 4px solid #8d6e63;
            padding-left: 10px;
            margin-bottom: 10px;
        }

        .form-control {
            border: 1px solid #e0e0e0;
            border-radius: 0;
            background-color: #fafafa;
            transition: 0.3s;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: #5d4037;
            box-shadow: none;
        }

        .btn-submit {
            background-color: #5d4037;
            color: #fff;
            border-radius: 0;
            padding: 12px 30px;
            border: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #3e2723;
            color: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-back {
            color: #8d6e63;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-back:hover {
            color: #3e2723;
            text-decoration: underline;
        }

        .target-book-info {
            background: #efebe9;
            padding: 15px;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
            border: 1px solid #d7ccc8;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="annotation-container">
        <h1>
            <span>Add Annotation</span>
            「{{ post.title }}」に詳細情報を追加する
        </h1>

        <div class="target-book-info">
            対象蔵書: <strong>{{ post.title }}</strong>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label">詳細タイトル (Sub Title)</label>
                <input type="text" name="sub_title" class="form-control" required placeholder="追加情報の見出しを入力...">
            </div>

            <div class="mb-5">
                <label class="form-label">詳細本文 (Sub Content)</label>
                <textarea name="sub_content" rows="12" class="form-control" required placeholder="具体的な内容を詳しく綴ってください..."></textarea>
            </div>

            <div class="d-flex justify-content-between align-items-center border-top pt-4">
                <a href="{% url 'post_detail' post.pk %}" class="btn-back">
                    ← 詳細ページに戻る
                </a>
                <button type="submit" class="btn btn-submit">
                    詳細内容を投稿する
                </button>
            </div>
        </form>
    </div>
</div>

<footer class="text-center mt-5 mb-5 text-muted">
    <small>© 2026 Private Library Management System - Annotation Desk</small>
</footer>

</body>
</html>
