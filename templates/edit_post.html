<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔵書の編集 - Archive Restore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f1ea;
            background-image: url('https://www.transparenttextures.com/patterns/paper.png');
            font-family: 'Sawarabi Mincho', serif;
            color: #3e2723;
            padding: 40px 0;
        }

        .restore-container {
            max-width: 800px;
            background: #fff;
            padding: 50px;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #d7ccc8;
            position: relative;
        }

        /* 装飾的な角のデザイン（羊皮紙風） */
        .restore-container::before {
            content: "";
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px double #d7ccc8;
            pointer-events: none;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-style: italic;
            color: #5d4037;
            margin-bottom: 40px;
            letter-spacing: 2px;
            border-bottom: 1px solid #d7ccc8;
            padding-bottom: 15px;
        }

        .form-label {
            color: #5d4037;
            font-weight: bold;
            margin-bottom: 8px;
            display: inline-block;
        }

        .form-control {
            border: 1px solid #e0e0e0;
            border-radius: 0;
            background-color: #fafafa;
            transition: 0.3s;
            font-family: sans-serif; /* 入力文字は読みやすく */
        }

        .form-control:focus {
            background-color: #fff;
            border-color: #5d4037;
            box-shadow: none;
        }

        /* 現在の画像の表示エリア */
        .current-image-box {
            background: #efebe9;
            padding: 15px;
            border: 1px solid #d7ccc8;
            display: inline-block;
            margin-bottom: 10px;
        }

        .btn-restore {
            background-color: #5d4037;
            color: #fff;
            border-radius: 0;
            padding: 12px 40px;
            border: none;
            letter-spacing: 2px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-restore:hover {
            background-color: #3e2723;
            color: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-cancel {
            color: #8d6e63;
            text-decoration: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-cancel:hover {
            color: #3e2723;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="restore-container">
        <h2>Archive Restore / Edit</h2>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label">タイトル (Title)</label>
                <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
            </div>

            <div class="mb-4">
                <label class="form-label">よみがな (Reading)</label>
                <input type="text" name="title_kana" class="form-control" value="{{ post.title_kana }}">
            </div>

            <div class="mb-4">
                <label class="form-label">概要 (Summary)</label>
                <input type="text" name="summary" class="form-control" value="{{ post.summary }}">
            </div>

            <div class="mb-4">
                <label class="form-label">イラストの修復 (Illustration Update)</label>
                <div class="p-3 border bg-light">
                    {% if post.image %}
                        <div class="mb-3 text-center">
                            <span class="text-muted d-block small mb-2">現在の画像:</span>
                            <div class="current-image-box">
                                <img src="{{ post.image.url }}" alt="current image" style="max-height: 150px; width: auto; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);">
                            </div>
                        </div>
                    {% endif %}
                    <input type="file" name="image" class="form-control" accept="image/*">
                </div>
            </div>

            <div class="mb-5">
                <label class="form-label">本文の追記・修正 (Content - Restore & Append)</label>
                <textarea name="content" rows="15" class="form-control" placeholder="物語を修復、または追記してください...">{{ post.content }}</textarea>
            </div>

            <div class="d-flex justify-content-between align-items-center border-top pt-4">
                <a href="{% url 'post_detail' post.pk %}" class="btn-cancel">
                    &lt; キャンセルして戻る
                </a>
                <button type="submit" class="btn btn-restore">
                    更新内容を保存する
                </button>
            </div>
        </form>
    </div>
</div>

<footer class="text-center mt-5 mb-5 text-muted">
    <small>© 2026 Private Library Management System - Restoration Department</small>
</footer>

</body>
</html>
